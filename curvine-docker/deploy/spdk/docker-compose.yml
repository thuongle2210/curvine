# Curvine Full Stack (Master + SPDK NVMe-oF Target + Initiator)
#
# All cluster config comes from curvine-cluster.toml.
# Set CURVINE_CONF_FILE to your config path, or place it at ./curvine-cluster.toml.
# Service names resolve via Docker DNS on the "spdk" bridge network.
#
# Prerequisites (run on host before starting):
#   sudo sysctl -w vm.nr_hugepages=1024
#   sudo modprobe vfio-pci
#   sudo driverctl set-override <NVMe-PCI-ADDR> vfio-pci   # bind NVMe to VFIO for userspace driver
#   sudo modprobe nvme nvme-fabrics nvme-tcp
#
# KVM (Intel): intel_iommu=on in kernel cmdline. Cloud VMs usually have this already.
#
# Usage:
#   cd curvine-docker/deploy/spdk
#   docker compose up --build
#
# To use a custom config:
#   CURVINE_CONF_FILE=./my-cluster.toml docker compose up --build

x-shared-env: &shared-env
  CURVINE_CONF_FILE: /app/curvine/conf/curvine-cluster.toml

x-target-base: &target-base
  build:
    context: ../../..
    dockerfile: curvine-docker/deploy/spdk/Dockerfile
    target: target-runtime
  privileged: true
  volumes:
    - /dev/vfio:/dev/vfio
    - /dev/hugepages:/dev/hugepages
    - ${CURVINE_CONF_FILE:-./curvine-cluster.toml}:/app/curvine/conf/curvine-cluster.toml
  restart: unless-stopped
  networks:
    spdk:

networks:
  spdk:
    name: spdk

services:
  # ============================================================
  # SPDK NVMe-oF Targets (Storage Nodes) — one per physical device
  # ============================================================
  target-1:
    <<: *target-base
    hostname: target-1
    environment:
      <<: *shared-env
      MEM_SIZE: "1024"
      NVME_PCI_ADDR: "0000:02:00.0"

  # ============================================================
  # Curvine Master (Metadata Server)
  # ============================================================
  master:
    build:
      context: ../../..
      dockerfile: curvine-docker/deploy/spdk/Dockerfile
      target: initiator-runtime
    volumes:
      - ${CURVINE_CONF_FILE:-./curvine-cluster.toml}:/app/curvine/conf/curvine-cluster.toml
    command: ["master", "start"]
    restart: unless-stopped
    depends_on:
      - target-1
    networks:
      spdk:

  # ============================================================
  # SPDK NVMe-oF Initiator (Compute Node — Curvine Worker)
  # ============================================================
  initiator:
    build:
      context: ../../..
      dockerfile: curvine-docker/deploy/spdk/Dockerfile
      target: initiator-runtime
    privileged: true
    volumes:
      - /dev/hugepages:/dev/hugepages
      - ${CURVINE_CONF_FILE:-./curvine-cluster.toml}:/app/curvine/conf/curvine-cluster.toml
    depends_on:
      - master
      - target-1
    command: ["worker", "start"]
    restart: unless-stopped
    networks:
      spdk:
