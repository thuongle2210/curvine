# All cluster config comes from curvine-cluster.toml.
# Set CURVINE_TOML to your config path, or place it at ./curvine-cluster.toml.
# Service names resolve via Docker DNS (e.g., "storage-target", "master").
#
# Build order: storage-target → master → initiator
# (shared layers from deps/build/spdk-full reuse cached builds)
#
# Usage:
#   CURVINE_TOML=./example/conf/curvine-cluster-spdk.toml docker compose up --build

x-init-common: &init-common
  privileged: true
  volumes:
    - /dev/hugepages:/dev/hugepages
    - ${CURVINE_TOML:-./curvine-cluster.toml}:/app/curvine/conf/curvine-cluster.toml
  networks:
    spdk:

services:
  # ============================================================
  # SPDK NVMe-oF Target (storage node) — builds first
  # ============================================================
  storage-target:
    build:
      context: ../..
      dockerfile: curvine-docker/deploy/spdk/Dockerfile
      target: target-runtime
    privileged: true
    volumes:
      - /dev:/dev
      - /dev/hugepages:/dev/hugepages
      - ${CURVINE_TOML:-./curvine-cluster.toml}:/etc/curvine/cluster.toml
    environment:
      - NVME_PCI_ADDR=${NVME_PCI_ADDR:-}
      - CURVINE_CONF_FILE=/etc/curvine/cluster.toml
    restart: unless-stopped
    networks:
      spdk:

  # ============================================================
  # Curvine Master (metadata server) — builds second
  # ============================================================
  master:
    build:
      context: ../..
      dockerfile: curvine-docker/deploy/spdk/Dockerfile
      target: initiator-runtime
    volumes:
      - ${CURVINE_TOML:-./curvine-cluster.toml}:/app/curvine/conf/curvine-cluster.toml
    command: ["master", "start"]
    restart: unless-stopped
    depends_on:
      - storage-target
    networks:
      spdk:

  # ============================================================
  # SPDK NVMe-oF Initiator (compute node — Curvine Worker)
  # ============================================================
  initiator:
    build:
      context: ../..
      dockerfile: curvine-docker/deploy/spdk/Dockerfile
      target: initiator-runtime
    <<: *init-common
    depends_on:
      - master
      - storage-target
    command: ["worker", "start"]
    restart: unless-stopped
    deploy:
      replicas: 1

networks:
  spdk:
    name: spdk
