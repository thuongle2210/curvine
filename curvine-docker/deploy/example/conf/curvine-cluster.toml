
format_master = false
format_worker = false
cluster_id = "curvine"

# Network interface (e.g. "eth0") used to auto-resolve this node's local IPv4.
# When set (non-empty), on startup the resolved IPv4 is applied to the
# master/journal/worker/client hostnames, and the CURVINE_*_HOSTNAME env vars
# are ignored. When empty (the default), hostnames come from the config below
# and may be overridden by the CURVINE_*_HOSTNAME env vars.
#
# Multi-node note: this only fills THIS node's own hostname. The cluster
# membership lists (journal.journal_addrs and client.master_addrs) must still
# be written out explicitly, and each node's entry must use the exact IPv4 that
# its interface resolves to -- otherwise the node cannot locate itself in the
# raft group and startup fails with a clear error.
# net_interface = "eth0"

[master]
rpc_port = 8995
web_port = 9000
meta_dir = "./data/meta"
audit_logging_enabled = true
log = { level = "info", log_dir = "./logs", file_name = "master.log" }

[journal]
rpc_port = 8996
journal_addrs = [
    {id = 1, hostname = "cv-master-0.svc.cluster.local", port = 8996},
    {id = 2, hostname = "cv-master-1.svc.cluster.local", port = 8996},
    {id = 3, hostname = "cv-master-2.svc.cluster.local", port = 8996}
]
journal_dir = "./data/journal"

[worker]
rpc_port = 8997
web_port = 9000
dir_reserved = "10GB"
data_dir = [
    "[SSD]/data/data1",
]
log = { level = "info", log_dir = "./logs", file_name = "worker.log" }


[client]
master_addrs = [
    { hostname = "cv-master-0.svc.cluster.local", port = 8995 },
    { hostname = "cv-master-1.svc.cluster.local", port = 8995 },
    { hostname = "cv-master-2.svc.cluster.local", port = 8995 }
]

[fuse]
debug = false
# Kernel-side metadata cache timeouts (milliseconds).
# BREAKING: the old second-based keys attr_timeout / entry_timeout /
# negative_timeout were renamed to *_ms (value x1000) and are now ignored.
attr_timeout_ms = 1000
entry_timeout_ms = 1000
negative_timeout_ms = 0

[log]
level = "info"
log_dir = "./logs"
file_name = "client.log"
