# Whether to format it.  
# master formatting will delete rocksdb metadata  
# Worker formatting will delete the data directory.  
format_master = true  
format_worker = true  

# Network interface (e.g. "eth0") used to auto-resolve this node's local IPv4.  
# When set (non-empty), on startup the resolved IPv4 is applied to the  
# master/journal/worker/client hostnames, and the CURVINE_*_HOSTNAME env vars  
# are ignored. When empty (the default), hostnames come from the config below  
# and may be overridden by the CURVINE_*_HOSTNAME env vars.  
#  
# Multi-node note: this only fills THIS node's own hostname. The cluster  
# membership lists (journal.journal_addrs and client.master_addrs) must still  
# be written out explicitly, and each node's entry must use the exact IPv4 that  
# its interface resolves to -- otherwise the node cannot locate itself in the  
# raft group and startup fails with a clear error.  
# net_interface = "eth0"  

# master configuration  
[master]  
meta_dir = "testing/meta"  
log = { level = "info", log_dir = "stdout", file_name = "master.log" }  
  
  
# master ha raft configuration.  
[journal]  
journal_addrs = [  
    {id = 1, hostname = "localhost", port = 8996}  
]  
journal_dir = "testing/journal"  
  
  
# Worker configuration  
[worker]  
dir_reserved = "0"  
data_dir = [  
    "[SPDK_DISK]testing/data", 
] 
log = { level = "debug", log_dir = "stdout", file_name = "worker.log" }  
enable_s3_gateway = false  

io_threads=2
worker_threads=2
  
# SPDK over NVMe-oF/TCP configuration  
[worker.spdk_disk]  
enabled = true  
app_name = "curvine"  
hugepage = "10MB"
reactor_mask = "0x30"  
# iova_mode = "va"  # set on VM/container hosts if env_init fails with PA IOVA error
# NVMe-oF targets  
[[worker.spdk_disk.targets]]
trtype = "tcp"  
adrfam = "ipv4"  
traddr = "127.0.0.1"  
trsvcid = 4420  
subnqn = "nqn.2026-05.curvine:cnode1"  

# Client configuration  
[client]
short_circuit = false

# fuse configuration  
[fuse]  
  
# Log configuration  
[log]  
level = "debug"  
log_dir = "stdout"  
file_name = "curvine.log"  
  
  
# S3 Object Gateway configuration  
[s3_gateway]  
listen = "0.0.0.0:9900"  
region = "us-east-1"  
put_temp_dir = "/tmp/curvine-temp"  
put_memory_buffer_threshold = 1048576  
put_max_memory_buffer = 16777216  
get_chunk_size_mb = 1.0  
  
[cli]  
log = { level = "warn", log_dir = "stdout", file_name = "cli.log" }