
# Whether to format it.
# master formatting will delete rocksdb metadata
# Worker formatting will delete the data directory.
format_master = false
format_worker = false


# master configuration
[master]
meta_dir = "testing/meta"
log = { level = "info", log_dir = "stdout", file_name = "master.log" }


# masta ha raft configuration.
[journal]
journal_addrs = [
    {id = 1, hostname = "localhost", port = 8996}
]
journal_dir = "testing/journal"


# Worker configuration
[worker]
dir_reserved = "0"

# with spdk_disk data dir
# NVMe subsystems (explicit namespace binding via datadir prefix)
# Format: [SPDK_DISK:SIZE|SUBNQN|NSID]/path

data_dir = [
    "[DISK]testing/data",
    "[SPDK_DISK:10GB|nqn.2024-01.com.curvine:test|1]/mnt/nvme1/data",
    "[SPDK_DISK:10GB|nqn.2024-01.com.curvine:test|2]/mnt/nvme2/data",
    "[SPDK_DISK:10GB|nqn.2024-01.com.curvine:test|3]/mnt/nvme3/data",
]
log = { level = "info", log_dir = "stdout", file_name = "worker.log" }
enable_s3_gateway = false

# SPDK over NVMe-oF/RDMA configuration
[worker.spdk_disk]
enabled = false
app_name = "curvine"
hugepage = "1024MB"
reactor_mask = "0x3"
shm_id = -1
mem_channel = 0

# Controller selection strategy: "First" (default), "RoundRobin", or "Random"
controller_selection = "First"

# I/O parameters
io_queue_depth = 128
io_queue_requests = 512
io_timeout = "30s"
io_retry_count = 4
keep_alive_timeout = "10s"
poll_interval = 1000

# DMA buffer pool
dma_pool_size = "64MB"
block_align = 0

# NVMe-oF subsystems
[[worker.spdk_disk.subsystems]]
trtype = "tcp"
adrfam = "ipv4"
traddr = "127.0.0.1"
trsvcid = 4420
subnqn = "nqn.2024-01.com.curvine:test"
controller_count = 3
hostnqn = ""
io_queues = 0
keep_alive_timeout_ms = 0
namespace_ids = [1, 2, 3]

[[worker.spdk_disk.subsystems]]
trtype = "tcp"
adrfam = "ipv4"
traddr = "127.0.0.1"
trsvcid = 4421
subnqn = "nqn.2024-01.com.curvine:test2"
controller_count = 1
hostnqn = ""
io_queues = 0
keep_alive_timeout_ms = 0
namespace_ids = [1]


# Customer service configuration.
[client]

# fuse configuration
[fuse]

# The log configuration of the customer service side, and the customer service side of rust, java, and fuse use this log file.
[log]
level = "info"
log_dir = "stdout"
file_name = "curvine.log"


# S3 Object Gateway configuration
[s3_gateway]
# Listen address for S3 gateway (host:port)
listen = "0.0.0.0:9900"
region = "us-east-1"
# Temporary directory for all PUT operations (multipart and regular)
put_temp_dir = "/tmp/curvine-temp"
# Memory buffer threshold for small files (bytes, default: 1MB)
put_memory_buffer_threshold = 1048576
# Maximum memory buffer size (bytes, default: 16MB)
put_max_memory_buffer = 16777216

# GET Performance Optimization Settings
# GET read/write chunk size in MB (default: 1.0, options: 0.5/1/2)
get_chunk_size_mb = 1.0

[cli]
log = { level = "warn", log_dir = "stdout", file_name = "cli.log" }