
# Whether to format it.
# master formatting will delete rocksdb metadata
# Worker formatting will delete the data directory.
format_master = false
format_worker = false

# Test-only remote fault control. Exposing the HTTP API requires BOTH:
#   1) enabled = true below, and
#   2) binaries built with `--features fault-injection`
#      (e.g. curvine-server/fault-injection).
# Enabling this without rebuilding fails server startup instead of silently
# omitting the requested route.
# Keep disabled in normal runs.
[fault_injection]
enabled = false
auth_token_env = "CURVINE_FAULT_TOKEN"


# master configuration
[master]
meta_dir = "testing/meta"
log = { level = "info", log_dir = "stdout", file_name = "master.log" }


# masta ha raft configuration.
[journal]
journal_addrs = [
    {id = 1, hostname = "localhost", port = 8996}
]
journal_dir = "testing/journal"


# Worker configuration
[worker]
dir_reserved = "0"
data_dir = [
    "[DISK]testing/data",
]
log = { level = "info", log_dir = "stdout", file_name = "worker.log" }

# SPDK over NVMe-oF/RDMA configuration  
[worker.spdk_disk]  
enabled = false  
app_name = "curvine"  
reactor_mask = "0x3"  


# NVMe-oF targets  
[[worker.spdk_disk.targets]]  
trtype = "rdma"  
adrfam = "ipv4"  
traddr = "192.168.1.100"  
trsvcid = 4420  
subnqn = "nqn.2024-01.io.curvine:subsystem1"  
[[worker.spdk_disk.targets]]  
trtype = "rdma"  
adrfam = "ipv4"  
traddr = "192.168.1.101"  
trsvcid = 4420  
subnqn = "nqn.2024-01.io.curvine:subsystem2"

# Customer service configuration.
[client]

# fuse configuration
[fuse]
# Kernel-side metadata cache timeouts (milliseconds).
# NOTE: renamed in a breaking change — the old second-based f64 keys
# (attr_timeout / entry_timeout / negative_timeout) are no longer recognized
# and are silently ignored. Migrate by switching to the *_ms keys below and
# multiplying the old value by 1000.
attr_timeout_ms = 1000       # kernel attribute cache; 0 disables it
entry_timeout_ms = 1000      # kernel dentry (name lookup) cache; 0 disables it
negative_timeout_ms = 0      # negative-lookup (ENOENT) cache; 0 = disabled

# The log configuration of the customer service side, and the customer service side of rust, java, and fuse use this log file.
[log]
level = "info"
log_dir = "stdout"
file_name = "curvine.log"

[cli]
log = { level = "warn", log_dir = "stdout", file_name = "cli.log" }
