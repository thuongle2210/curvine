# Curvine Cluster Config for Docker Compose (SPDK + NVMe-oF)
#
# Service names resolve via Docker DNS on the "spdk" bridge network.
# Place this file at curvine-docker/deploy/curvine-cluster.toml
# or set: CURVINE_TOML=./example/conf/curvine-cluster-spdk.toml
# Then:   docker compose up --build

format_master = false
format_worker = false
cluster_id = "curvine"

# ============================================================
# Master (metadata server)
# ============================================================
[master]
rpc_port = 8995
web_port = 9000
hostname = "master"
meta_dir = "./data/meta"
audit_logging_enabled = true
log = { level = "info", log_dir = "./logs", file_name = "master.log" }

# ============================================================
# Journal (Raft consensus)
# ============================================================
[journal]
rpc_port = 8996
journal_addrs = [
    { id = 1, hostname = "master", port = 8996 }
]
journal_dir = "./data/journal"

# ============================================================
# Worker (compute node)
# ============================================================
[worker]
rpc_port = 8997
web_port = 9000
dir_reserved = "10GB"
data_dir = [
    "[SSD]/data/data1",
]
log = { level = "info", log_dir = "./logs", file_name = "worker.log" }

# SPDK NVMe-oF initiator configuration
[worker.spdk_disk]
enabled = true
app_name = "curvine"
hugepage = "1024MB"
reactor_mask = "0x1"
shm_id = -1
mem_channel = 0

# I/O parameters
io_queue_depth = 128
io_queue_requests = 512
io_timeout = "30s"
io_retry_count = 4
keep_alive_timeout = "10s"
poll_interval = 1000

# DMA buffer pool
dma_pool_size = "64MB"
block_align = 0

# NVMe-oF target — points to storage-target service
[[worker.spdk_disk.targets]]
trtype = "tcp"
adrfam = "ipv4"
traddr = "storage-target"
trsvcid = 4420
subnqn = "nqn.2025-03.io.curvine:cnode1"
hostnqn = ""
io_queues = 0
keep_alive_timeout_ms = 0

# ============================================================
# Client (SDK / FUSE)
# ============================================================
[client]
master_addrs = [
    { hostname = "master", port = 8995 }
]

# ============================================================
# FUSE
# ============================================================
[fuse]
debug = false
mnt_path = "/curvine-fuse"

# ============================================================
# Logging
# ============================================================
[log]
level = "info"
log_dir = "./logs"
file_name = "curvine.log"

[cli]
log = { level = "warn", log_dir = "./logs", file_name = "cli.log" }
