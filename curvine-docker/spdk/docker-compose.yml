# SPDK NVMe-oF Target + Initiator Docker Compose
#
# Dev/test only — runs both target (storage node) and initiator (compute node)
# on the same machine. In production, these are deployed on separate physical machines.
#
# Prerequisites (run on host before docker-compose up):
#   sudo sysctl -w vm.nr_hugepages=4096
#   sudo modprobe uio_pci_generic
#   sudo modprobe nvme nvme-fabrics nvme-tcp nvme-rdma
#
# Usage:
#   cd curvine-docker/spdk
#   docker compose up --build
#
# To override target NVMe PCI address (default: VirtualBox NVMe):
#   NVME_PCI_ADDR=0000:01:00.0 docker compose up --build

x-network: &spdk-net
  name: spdk-net
  driver: bridge

services:
  # ============================================================
  # SPDK NVMe-oF Target (Storage Node)
  # ============================================================
  target:
    build:
      context: ../..
      dockerfile: curvine-docker/spdk/Dockerfile.target
    container_name: spdk-target
    privileged: true
    network_mode: "host"
    environment:
      TARGET_IP: "${TARGET_IP:-127.0.0.1}"
      TARGET_PORT: "${TARGET_PORT:-4420}"
      NVME_PCI_ADDR: "${NVME_PCI_ADDR:-0000:00:0e.0}"
      SUBNQN: "${SUBNQN:-nqn.2025-03.io.curvine:cnode1}"
      SERIAL: "${SERIAL:-SPDK0001}"
      TRANSPORT_MODE: "${TRANSPORT_MODE:-tcp}"
      REACTOR_MASK: "${REACTOR_MASK:-0x3}"
      SHM_ID: "${SHM_ID:--1}"
      MEM_SIZE: "${MEM_SIZE:-1024}"
      NR_HUGE_PAGES: "${NR_HUGE_PAGES:-1024}"
    volumes:
      - /dev:/dev
      - /lib/modules:/lib/modules
      - /dev/hugepages:/dev/hugepages
    cap_add:
      - SYS_ADMIN
      - IPC_LOCK
    restart: "no"

  # ============================================================
  # SPDK NVMe-oF Initiator (Compute Node — Curvine Worker)
  # ============================================================
  initiator:
    build:
      context: ../..
      dockerfile: curvine-docker/spdk/Dockerfile.initiator
    container_name: spdk-initiator
    privileged: true
    network_mode: "host"
    environment:
      TARGET_IP: "${TARGET_IP:-127.0.0.1}"
      TARGET_PORT: "${TARGET_PORT:-4420}"
      SUBNQN: "${SUBNQN:-nqn.2025-03.io.curvine:cnode1}"
      TRANSPORT_TYPE: "${TRANSPORT_TYPE:-tcp}"
      CURVINE_CONF_FILE: "/app/curvine/conf/curvine-cluster.toml"
      SPDK_DIR: "/opt/spdk"
      LD_LIBRARY_PATH: "/opt/spdk/lib:/opt/spdk/dpdk/lib"
    volumes:
      - /dev/hugepages:/dev/hugepages
      - /lib/modules:/lib/modules
    cap_add:
      - SYS_ADMIN
      - IPC_LOCK
    depends_on:
      - target
    restart: "no"
