apiVersion: data.fluid.io/v1alpha1
kind: CacheRuntimeClass
metadata:
  name: curvine
fileSystemType: curvinefs
topology:
  master:
    service:
      headless: {}
    executionEntries:
      mountUFS:
        command:
        - bash
        - -c
        - /app/curvine/mountUfs.sh
        timeout: 120
    template:
      spec:
        restartPolicy: Always
        containers:
        - name: master
          image: curvine-fluid:latest
          command:
          - /entrypoint.sh
          args:
          - master
          - start
          imagePullPolicy: IfNotPresent
          readinessProbe:
            tcpSocket:
              port: 8995
            initialDelaySeconds: 35
            periodSeconds: 5
            failureThreshold: 12
          env:
          - name: POD_NAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.name
          volumeMounts:
          - name: curvine-logs
            mountPath: /app/curvine/logs
          - name: curvine-master-data
            mountPath: /app/curvine/data
  worker:
    service:
      headless: {}
    template:
      spec:
        restartPolicy: Always
        containers:
        - name: worker
          image: curvine-fluid:latest
          command:
          - /entrypoint.sh
          args:
          - worker
          - start
          imagePullPolicy: IfNotPresent
          readinessProbe:
            tcpSocket:
              port: 8997
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          env:
          - name: POD_NAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.name
          volumeMounts:
          - name: curvine-logs
            mountPath: /app/curvine/logs
          - name: curvine-cache
            mountPath: /app/curvine/data
  client:
    template:
      spec:
        restartPolicy: Always
        containers:
        - name: client
          image: curvine-fluid:latest
          command:
          - /entrypoint.sh
          args:
          - client
          - start
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
            runAsUser: 0
          lifecycle:
            preStop:
              exec:
                command:
                - /bin/sh
                - -c
                - |
                  target_path="${CURVINE_TARGET_PATH:-${FLUID_RUNTIME_MOUNT_PATH:-}}"
                  if [ -n "$target_path" ] && mountpoint -q "$target_path" 2>/dev/null; then
                    fusermount -u "$target_path" 2>/dev/null || umount -f "$target_path" 2>/dev/null || true
                  fi
